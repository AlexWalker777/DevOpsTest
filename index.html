<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GREEN-API Test</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>GREEN-API Dashboard</h1>

    <div class="credentials">
      <label>ID Instance:</label>
      <input type="text" id="idInstance" placeholder="Введите idInstance">
      <label>API Token:</label>
      <input type="text" id="apiToken" placeholder="Введите ApiTokenInstance">
    </div>

    <div class="buttons">
      <button id="getSettingsBtn">getSettings</button>
      <button id="getStateBtn">getStateInstance</button>
      <button id="sendMessageBtn">sendMessage</button>
      <button id="sendFileBtn">sendFileByUrl</button>
    </div>

    <div class="output">
      <label>Ответ API:</label>
      <textarea id="apiResponse" readonly></textarea>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
